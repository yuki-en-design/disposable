<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>発表フィードバック</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #16162a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 460px;
    padding: 24px;
  }

  .color-btn {
    border: none;
    border-radius: 22px;
    padding: 36px 16px 30px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.1s ease;
    outline: none;
    position: relative;
    overflow: hidden;
  }

  .color-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.1s;
    border-radius: inherit;
  }

  .color-btn:active { transform: scale(0.93); }
  .color-btn:active::after { background: rgba(255,255,255,0.15); }

  .btn-icon { font-size: 46px; line-height: 1; }
  .btn-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: 0.03em; text-shadow: 0 1px 8px rgba(0,0,0,0.2); }
  .btn-sub { font-size: 12px; color: rgba(255,255,255,0.8); text-align: center; line-height: 1.6; }

  .btn-orange { background: linear-gradient(145deg, #F08030, #D06010); }
  .btn-green  { background: linear-gradient(145deg, #30B060, #1A8040); }
  .btn-purple { background: linear-gradient(145deg, #8855DD, #6633BB); }
  .btn-pink   { background: linear-gradient(145deg, #E04090, #B02070); }

  #fullscreen-view {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
  }

  #fullscreen-view.active { display: flex; }

  .fs-emoji { font-size: clamp(64px, 16vw, 110px); margin-bottom: 16px; }
  .fs-label {
    font-size: clamp(30px, 8vw, 58px);
    font-weight: 900;
    color: rgba(255,255,255,0.96);
    letter-spacing: 0.06em;
    text-align: center;
    padding: 0 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .fs-sub {
    font-size: clamp(15px, 3.5vw, 22px);
    color: rgba(255,255,255,0.78);
    margin-top: 14px;
    text-align: center;
    padding: 0 28px;
    line-height: 1.6;
  }
  .fs-hint {
    position: fixed;
    bottom: 28px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="grid">
  <button class="color-btn btn-orange" onclick="show('orange')">
    <span class="btn-icon">🔥</span>
    <span class="btn-title">声・話し方</span>
    <span class="btn-sub">声が大きく堂々と<br>発表できていた！</span>
  </button>

  <button class="color-btn btn-green" onclick="show('green')">
    <span class="btn-icon">💡</span>
    <span class="btn-title">内容・アイデア</span>
    <span class="btn-sub">調べ方や考え方が<br>よくまとまってた！</span>
  </button>

  <button class="color-btn btn-purple" onclick="show('purple')">
    <span class="btn-icon">✨</span>
    <span class="btn-title">伝わり方・工夫</span>
    <span class="btn-sub">聞き手への伝え方が<br>上手だった！</span>
  </button>

  <button class="color-btn btn-pink" onclick="show('pink')">
    <span class="btn-icon">🌟</span>
    <span class="btn-title">全部よかった！</span>
    <span class="btn-sub">全体的にすばらしい<br>発表だった！</span>
  </button>
</div>

<div id="fullscreen-view" onclick="hide()">
  <div class="fs-emoji" id="fs-emoji"></div>
  <div class="fs-label" id="fs-label"></div>
  <div class="fs-sub" id="fs-sub"></div>
  <div class="fs-hint">どこかタップして戻る</div>
</div>

<script>
const colors = {
  orange: { bg: 'linear-gradient(135deg, #F08030, #C05010)', emoji: '🔥', label: '声・話し方', sub: '声が大きく堂々と発表できていた！' },
  green:  { bg: 'linear-gradient(135deg, #30B060, #188040)', emoji: '💡', label: '内容・アイデア', sub: '調べ方や考え方がよくまとまってた！' },
  purple: { bg: 'linear-gradient(135deg, #8855DD, #5522AA)', emoji: '✨', label: '伝わり方・工夫', sub: '聞き手への伝え方が上手だった！' },
  pink:   { bg: 'linear-gradient(135deg, #E04090, #A01860)', emoji: '🌟', label: '全部よかった！', sub: '全体的にすばらしい発表だった！' },
};

function show(key) {
  const c = colors[key];
  const fv = document.getElementById('fullscreen-view');
  document.getElementById('fs-emoji').textContent = c.emoji;
  document.getElementById('fs-label').textContent = c.label;
  document.getElementById('fs-sub').textContent = c.sub;
  fv.style.background = c.bg;
  fv.classList.add('active');
  try {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch(e) {}
}

function hide() {
  document.getElementById('fullscreen-view').classList.remove('active');
  try {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } catch(e) {}
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') hide(); });
</script>
</body>
</html>
